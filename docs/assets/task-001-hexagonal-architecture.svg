<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">Task 001 Hexagonal Architecture</title>
  <desc id="desc">Hexagonal architecture diagram for Create Exercise API with inbound and outbound adapters.</desc>
  <defs>
    <style>
      .title { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .label { font: 600 16px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .core { fill: #fef3c7; stroke: #b45309; stroke-width: 3; }
      .box-inbound { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2.5; }
      .box-port { fill: #e2e8f0; stroke: #475569; stroke-width: 2.5; }
      .box-outbound { fill: #dcfce7; stroke: #166534; stroke-width: 2.5; }
      .box-db { fill: #f1f5f9; stroke: #0f172a; stroke-width: 2.5; }
      .box-shared { fill: #fae8ff; stroke: #7e22ce; stroke-width: 2.5; }
      .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #475569; stroke-width: 2.5; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="760" fill="#ffffff" />

  <text x="40" y="56" class="title">TASK-001: Create Exercise API - Hexagonal Architecture</text>
  <text x="40" y="84" class="subtitle">Ports and adapters with inward dependency direction</text>

  <polygon class="core" points="650,180 790,260 790,420 650,500 510,420 510,260" />
  <text x="650" y="320" text-anchor="middle" class="label">Hexagon Core</text>
  <text x="650" y="346" text-anchor="middle" class="small">CreateExerciseUseCase</text>
  <text x="650" y="368" text-anchor="middle" class="small">Exercise domain rules</text>

  <rect x="110" y="285" width="270" height="120" rx="12" class="box-inbound"/>
  <text x="245" y="333" text-anchor="middle" class="label">Inbound Adapter</text>
  <text x="245" y="358" text-anchor="middle" class="small">FastAPI Router + Schemas</text>

  <rect x="840" y="220" width="300" height="110" rx="12" class="box-port"/>
  <text x="990" y="262" text-anchor="middle" class="label">Outbound Port</text>
  <text x="990" y="287" text-anchor="middle" class="small">ExerciseRepository (interface)</text>

  <rect x="860" y="365" width="300" height="110" rx="12" class="box-outbound"/>
  <text x="1010" y="407" text-anchor="middle" class="label">Outbound Adapter</text>
  <text x="1010" y="432" text-anchor="middle" class="small">SqlAlchemyExerciseRepository</text>

  <rect x="885" y="525" width="250" height="110" rx="12" class="box-db"/>
  <text x="1010" y="567" text-anchor="middle" class="label">Database</text>
  <text x="1010" y="592" text-anchor="middle" class="small">SQLite / PostgreSQL</text>

  <rect x="110" y="120" width="260" height="90" rx="12" class="box-shared"/>
  <text x="240" y="156" text-anchor="middle" class="label">Shared Service</text>
  <text x="240" y="180" text-anchor="middle" class="small">Feature Flags</text>

  <rect x="110" y="470" width="260" height="90" rx="12" class="box-shared"/>
  <text x="240" y="506" text-anchor="middle" class="label">Shared Service</text>
  <text x="240" y="530" text-anchor="middle" class="small">Structured Logging</text>

  <line x1="380" y1="345" x2="510" y2="345" class="arrow"/>
  <line x1="790" y1="290" x2="840" y2="275" class="arrow"/>
  <line x1="990" y1="330" x2="1010" y2="365" class="arrow"/>
  <line x1="1010" y1="475" x2="1010" y2="525" class="arrow"/>

  <line x1="370" y1="180" x2="520" y2="265" class="arrow-dashed"/>
  <line x1="370" y1="515" x2="520" y2="420" class="arrow-dashed"/>

  <text x="860" y="680" class="small">Dependency rule: adapters depend on core; core depends only on ports.</text>
</svg>
